<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="50일"/>
  <meta name="theme-color" content="#E30613"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <title>50일 습관 챌린지</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net"/>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
  <style>
    :root {
      --red: #E30613;
      --black: #1a1a1a;
      --bg: #f5f4f0;
      --card: #ffffff;
      --muted: #999;
      --border: #f0f0f0;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; color: var(--black); }
    body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

    /* Layout */
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    #scroll { flex: 1; overflow-y: auto; padding: 28px 18px 100px; }

    /* Bottom nav */
    #bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(14px);
      border-top: 1px solid rgba(0,0,0,0.07);
      display: flex; padding: 10px 0 calc(10px + var(--safe-bottom));
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; border: none; background: none; font-family: inherit; }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.02em; }
    .nav-item.active .nav-label { color: var(--red); }
    .nav-item.active .nav-icon { filter: none; }

    /* Header */
    .header { margin-bottom: 22px; }
    .header-tag { font-size: 11px; font-weight: 800; color: var(--red); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    .header-title { font-size: 26px; font-weight: 800; line-height: 1.25; color: var(--black); }

    /* Card */
    .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }

    /* Progress ring */
    #ring-wrap { display: flex; align-items: center; gap: 22px; }
    #ring-svg { transform: rotate(-90deg); flex-shrink: 0; }
    #ring-label { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
    #ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #ring-pct { font-size: 22px; font-weight: 900; color: var(--black); }
    #ring-info h2 { font-size: 22px; font-weight: 900; }
    #ring-info p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    #day-nav { display: flex; gap: 6px; margin-top: 12px; }
    .day-btn { background: var(--border); border: none; border-radius: 9px; padding: 5px 14px; font-size: 18px; font-weight: 800; color: #555; cursor: pointer; font-family: inherit; }
    .day-btn:active { opacity: 0.7; }

    /* Habit card */
    .habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .habit-title { display: flex; align-items: center; gap: 9px; }
    .habit-emoji { font-size: 20px; }
    .habit-name { font-size: 16px; font-weight: 800; }
    .habit-count { font-size: 13px; font-weight: 800; }
    .mini-bar { height: 4px; background: var(--border); border-radius: 4px; margin-bottom: 14px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 4px; transition: width 0.35s ease; }

    /* Task row */
    .task-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .task-row:last-child { border-bottom: none; }
    .check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; background: none; }
    .check.done { background: var(--red); border-color: var(--red); }
    .task-label { font-size: 15px; transition: all 0.2s; user-select: none; }
    .task-label.done { color: #bbb; text-decoration: line-through; }

    /* Calendar */
    #cal-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 7px; }
    .cal-dot { border-radius: 50%; aspect-ratio: 1; cursor: pointer; transition: transform 0.1s; border: none; }
    .cal-dot:active { transform: scale(0.85); }
    .cal-dot.current { outline: 2.5px solid var(--black); outline-offset: 1.5px; }
    .cal-legend { display: flex; gap: 14px; margin-top: 18px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* Summary footer */
    #summary { display: flex; gap: 10px; margin-top: 0; }
    .sum-card { flex: 1; background: var(--card); border-radius: 14px; padding: 12px 8px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
    .sum-emoji { font-size: 18px; }
    .sum-pct { font-size: 14px; font-weight: 900; margin-top: 4px; }
    .sum-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; font-weight: 600; }

    /* Stats view */
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-bar-wrap { width: 120px; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .stat-bar { height: 100%; border-radius: 4px; background: var(--red); transition: width 0.4s; }

    /* Confetti */
    #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    .conf { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall 1.8s ease-in forwards; }
    @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

    /* Toast */
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: white; padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 998; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Install banner */
    #install-banner { background: var(--black); color: white; padding: 12px 16px; border-radius: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
    #install-banner .ib-icon { font-size: 28px; flex-shrink: 0; }
    #install-banner .ib-text { flex: 1; font-size: 13px; line-height: 1.5; }
    #install-banner .ib-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
    #install-banner .ib-close { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 0 4px; }
    #install-btn { background: var(--red); color: white; border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; font-family: inherit; }
  </style>
</head>
<body>
<div id="app">
  <div id="scroll">
    <!-- views injected by JS -->
  </div>
  <nav id="bottom-nav">
    <button class="nav-item active" data-view="today" onclick="switchView('today')">
      <span class="nav-icon">✅</span>
      <span class="nav-label">오늘</span>
    </button>
    <button class="nav-item" data-view="calendar" onclick="switchView('calendar')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">달력</span>
    </button>
    <button class="nav-item" data-view="stats" onclick="switchView('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">통계</span>
    </button>
  </nav>
</div>
<canvas id="confetti"></canvas>
<div id="toast"></div>

<script>
const HABITS = [
  { id:"health", label:"건강", emoji:"💪", color:"#E30613",
    tasks:["물 2L 마시기","30분 이상 운동","7시간 이상 수면","야식 금지"] },
  { id:"study",  label:"공부", emoji:"📖", color:"#1a1a1a",
    tasks:["독서 20페이지","강의/학습 30분","배운 것 기록","영어 10분"] },
  { id:"system", label:"체계", emoji:"🗂", color:"#666",
    tasks:["하루 계획 세우기","할 일 목록 정리","오늘 회고 작성","내일 준비"] },
];
const TOTAL = 50;
let currentDay = 1, currentView = "today";
let deferredPrompt = null;

// Storage helpers
function gk(d,h,i){ return `h50_d${d}_${h}_${i}`; }
function getCheck(d,h,i){ return localStorage.getItem(gk(d,h,i))==="1"; }
function setCheck(d,h,i,v){ localStorage.setItem(gk(d,h,i), v?"1":"0"); }
function getDayPct(d){
  let tot=0,done=0;
  HABITS.forEach(h=>h.tasks.forEach((_,i)=>{ tot++; if(getCheck(d,h.id,i)) done++; }));
  return tot?done/tot:0;
}
function getTotalPct(hid){
  let tot=0,done=0;
  for(let d=1;d<=TOTAL;d++) HABITS.find(h=>h.id===hid).tasks.forEach((_,i)=>{ tot++; if(getCheck(d,hid,i)) done++; });
  return tot?done/tot:0;
}
function getStreak(){
  let s=0;
  for(let d=currentDay;d>=1;d--){ if(getDayPct(d)===1) s++; else break; }
  return s;
}

// Views
function renderToday(){
  const pct = getDayPct(currentDay);
  const ring = 2*Math.PI*44;
  const off = ring*(1-pct);
  let html = `
    <div class="header">
      <div class="header-tag">50일 챌린지</div>
      <div class="header-title">나를 만드는<br>50일</div>
    </div>`;

  // Install banner
  if(deferredPrompt){
    html += `<div id="install-banner">
      <span class="ib-icon">📱</span>
      <div class="ib-text"><strong>앱으로 설치하기</strong>홈 화면에 추가해서 앱처럼 사용하세요</div>
      <button id="install-btn" onclick="installPWA()">설치</button>
      <button class="ib-close" onclick="document.getElementById('install-banner').remove()">✕</button>
    </div>`;
  }

  // Ring
  html += `<div class="card">
    <div id="ring-wrap">
      <div id="ring-label">
        <svg id="ring-svg" width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="44" fill="none" stroke="#f0f0f0" stroke-width="8"/>
          <circle cx="48" cy="48" r="44" fill="none" stroke="#E30613" stroke-width="8"
            stroke-dasharray="${ring.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
            stroke-linecap="round" style="transition:stroke-dashoffset .4s ease"/>
        </svg>
        <div id="ring-inner"><span id="ring-pct">${Math.round(pct*100)}%</span></div>
      </div>
      <div id="ring-info">
        <h2>${currentDay}일차</h2>
        <p>${TOTAL-currentDay}일 남음 · 🔥 ${getStreak()}일 연속</p>
        <div id="day-nav">
          <button class="day-btn" onclick="changeDay(-1)">‹</button>
          <button class="day-btn" onclick="changeDay(1)">›</button>
        </div>
      </div>
    </div>
  </div>`;

  // Habit cards
  HABITS.forEach(h=>{
    const done = h.tasks.filter((_,i)=>getCheck(currentDay,h.id,i)).length;
    const p = done/h.tasks.length;
    html += `<div class="card">
      <div class="habit-header">
        <div class="habit-title">
          <span class="habit-emoji">${h.emoji}</span>
          <span class="habit-name">${h.label}</span>
        </div>
        <span class="habit-count" style="color:${h.color}">${done}/${h.tasks.length}</span>
      </div>
      <div class="mini-bar"><div class="mini-bar-fill" style="width:${p*100}%;background:${h.color}"></div></div>`;
    h.tasks.forEach((t,i)=>{
      const checked = getCheck(currentDay,h.id,i);
      html += `<div class="task-row">
        <button class="check ${checked?'done':''}" onclick="toggle('${h.id}',${i})" aria-label="${t}">
          ${checked?`<svg width="12" height="9" viewBox="0 0 12 9"><polyline points="1,4.5 4.5,8 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`:''}
        </button>
        <span class="task-label ${checked?'done':''}">${t}</span>
      </div>`;
    });
    html += `</div>`;
  });

  // Summary row
  html += `<div id="summary">`;
  HABITS.forEach(h=>{
    const p = Math.round(getTotalPct(h.id)*100);
    html += `<div class="sum-card">
      <div class="sum-emoji">${h.emoji}</div>
      <div class="sum-pct">${p}%</div>
      <div class="sum-lbl">${h.label}</div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('scroll').innerHTML = html;
  if(pct===1) showConfetti();
}

function renderCalendar(){
  let html = `<div class="header">
    <div class="header-tag">50일 챌린지</div>
    <div class="header-title">전체 현황</div>
  </div>
  <div class="card">
    <div style="font-size:15px;font-weight:800;margin-bottom:16px">진행 달력</div>
    <div id="cal-grid">`;
  for(let d=1;d<=TOTAL;d++){
    const p = getDayPct(d);
    const isCur = d===currentDay;
    let bg;
    if(p===0) bg="#ece9e4";
    else if(p===1) bg="#E30613";
    else bg=`rgba(227,6,19,${0.2+p*0.6})`;
    html += `<button class="cal-dot ${isCur?'current':''}" style="background:${bg}" 
      title="${d}일차 ${Math.round(p*100)}%" onclick="goDay(${d})"></button>`;
  }
  html += `</div>
    <div class="cal-legend">
      <span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:#ece9e4"></span>미시작</span>
      <span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:rgba(227,6,19,0.5)"></span>진행중</span>
      <span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:#E30613"></span>완료</span>
    </div>
  </div>`;
  document.getElementById('scroll').innerHTML = html;
}

function renderStats(){
  const completedDays = Array.from({length:TOTAL},(_,i)=>i+1).filter(d=>getDayPct(d)===1).length;
  const totalPct = Math.round(Array.from({length:TOTAL},(_,i)=>getDayPct(i+1)).reduce((a,b)=>a+b,0)/TOTAL*100);
  let html = `<div class="header">
    <div class="header-tag">50일 챌린지</div>
    <div class="header-title">나의 통계</div>
  </div>
  <div class="card" style="display:flex;gap:0">`;
  
  const stats = [
    {label:"완료한 날", val:`${completedDays}일`, sub:"/ 50일"},
    {label:"전체 달성률", val:`${totalPct}%`, sub:""},
    {label:"연속 달성", val:`${getStreak()}일`, sub:"🔥"},
  ];
  stats.forEach(s=>{
    html += `<div style="flex:1;text-align:center;padding:8px 4px">
      <div style="font-size:26px;font-weight:900;color:#E30613">${s.val}</div>
      <div style="font-size:10px;color:#999;font-weight:700;margin-top:3px">${s.label} ${s.sub}</div>
    </div>`;
  });
  html += `</div>`;

  // Per-habit
  html += `<div class="card"><div style="font-size:15px;font-weight:800;margin-bottom:4px">카테고리별 달성률</div>`;
  HABITS.forEach(h=>{
    const p = getTotalPct(h.id);
    html += `<div class="stat-row">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">${h.emoji}</span>
        <span style="font-weight:700;font-size:14px">${h.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${p*100}%;background:${h.color}"></div></div>
        <span style="font-size:13px;font-weight:800;color:${h.color};min-width:34px;text-align:right">${Math.round(p*100)}%</span>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Day breakdown
  html += `<div class="card"><div style="font-size:15px;font-weight:800;margin-bottom:12px">일별 완료 현황</div>`;
  for(let d=1;d<=TOTAL;d++){
    const p = getDayPct(d);
    if(p>0){
      html += `<div class="stat-row" onclick="goDay(${d})" style="cursor:pointer">
        <span style="font-weight:700;font-size:14px">${d}일차</span>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="stat-bar-wrap"><div class="stat-bar" style="width:${p*100}%"></div></div>
          <span style="font-size:13px;font-weight:800;color:#E30613;min-width:34px;text-align:right">${Math.round(p*100)}%</span>
        </div>
      </div>`;
    }
  }
  html += `</div>`;
  document.getElementById('scroll').innerHTML = html;
}

function render(){
  if(currentView==="today") renderToday();
  else if(currentView==="calendar") renderCalendar();
  else renderStats();
}

function switchView(v){
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.view===v);
  });
  render();
  document.getElementById('scroll').scrollTop = 0;
}

function changeDay(d){
  currentDay = Math.max(1, Math.min(TOTAL, currentDay+d));
  render();
}
function goDay(d){ currentDay=d; switchView('today'); }

function toggle(hid, idx){
  const v = !getCheck(currentDay, hid, idx);
  setCheck(currentDay, hid, idx, v);
  const pct = getDayPct(currentDay);
  render();
  if(pct===1){
    showToast("🎉 오늘 완벽 달성!");
    showConfetti();
  } else if(v) {
    const h = HABITS.find(x=>x.id===hid);
    const done = h.tasks.filter((_,i)=>getCheck(currentDay,hid,i)).length;
    if(done===h.tasks.length) showToast(`${h.emoji} ${h.label} 완료!`);
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function showConfetti(){
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:60},()=>({
    x: Math.random()*canvas.width, y: -20,
    r: 4+Math.random()*6, c: ['#E30613','#FFD700','#4CAF50','#2196F3'][Math.floor(Math.random()*4)],
    vx: (Math.random()-0.5)*4, vy: 3+Math.random()*4, rot: Math.random()*360, vr: (Math.random()-0.5)*10
  }));
  let frame;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.06;
    });
    if(pieces.some(p=>p.y<canvas.height)) frame=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  cancelAnimationFrame(frame); draw();
}

// PWA install
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt=e;
  if(currentView==='today') render();
});
function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; });
}

// Service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// Init
render();
</script>
</body>
</html>
