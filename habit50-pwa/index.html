<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="50일"/>
  <meta name="theme-color" content="#E30613"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <title>50일 습관 챌린지</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
  <style>
    :root {
      --red: #E30613;
      --black: #1a1a1a;
      --bg: #f5f4f0;
      --card: #ffffff;
      --muted: #999;
      --border: #f0f0f0;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; color: var(--black); }
    body { padding-top: var(--safe-top); }

    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    #scroll { flex: 1; overflow-y: auto; padding: 28px 18px calc(90px + var(--safe-bottom)); }

    /* Bottom nav */
    #bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.94); backdrop-filter: blur(16px);
      border-top: 1px solid rgba(0,0,0,0.07);
      display: flex; padding: 10px 0 calc(10px + var(--safe-bottom));
      z-index: 100;
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; border: none; background: none; font-family: inherit; }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.02em; }
    .nav-item.active .nav-label { color: var(--red); }

    .header { margin-bottom: 20px; }
    .header-tag { font-size: 11px; font-weight: 800; color: var(--red); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .header-title { font-size: 26px; font-weight: 800; line-height: 1.25; }

    .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }

    /* Ring */
    #ring-wrap { display: flex; align-items: center; gap: 20px; }
    #ring-label { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
    #ring-label svg { transform: rotate(-90deg); }
    #ring-inner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #ring-pct { font-size: 21px; font-weight: 900; }
    #ring-info h2 { font-size: 21px; font-weight: 900; }
    #ring-info .sub { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.7; }
    #day-nav { display: flex; gap: 6px; margin-top: 10px; }
    .day-btn { background: var(--border); border: none; border-radius: 9px; padding: 5px 14px; font-size: 18px; font-weight: 800; color: #555; cursor: pointer; font-family: inherit; }
    .day-btn:active { opacity: 0.6; }

    /* Habit */
    .habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .mini-bar { height: 4px; background: var(--border); border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 4px; transition: width 0.35s; }
    .task-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .task-row:last-child { border-bottom: none; }
    .check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; background: none; }
    .check.done { background: var(--red); border-color: var(--red); }
    .task-label { font-size: 15px; transition: all 0.2s; user-select: none; flex: 1; }
    .task-label.done { color: #bbb; text-decoration: line-through; }

    /* Calendar */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 10px; color: var(--black); border-radius: 8px; font-family: inherit; }
    .cal-nav-btn:active { background: var(--border); }
    .cal-month-title { font-size: 16px; font-weight: 800; }
    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; margin-bottom: 6px; }
    .cal-dow span { font-size: 11px; font-weight: 700; color: var(--muted); padding: 4px 0; }
    .cal-dow span:first-child { color: #E30613; }
    .cal-dow span:last-child { color: #4488ff; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; border: none; background: none; font-family: inherit; transition: opacity 0.1s; }
    .cal-cell:active { opacity: 0.65; }
    .cal-cell.empty { cursor: default; pointer-events: none; }
    .cal-cell .dn { font-size: 13px; font-weight: 700; line-height: 1; }
    .cal-cell .db { width: 20px; height: 3px; border-radius: 2px; margin-top: 3px; }
    .cal-cell.out .dn { color: #ccc; }
    .cal-cell.is-today .dn { color: var(--red); font-weight: 900; }
    .cal-cell.selected { background: var(--black) !important; }
    .cal-cell.selected .dn { color: white !important; }
    .cal-cell.selected .db { background: rgba(255,255,255,0.4) !important; }
    .cal-cell.full { background: var(--red); }
    .cal-cell.full .dn { color: white; }
    .cal-cell.full .db { background: rgba(255,255,255,0.5); }
    .cal-cell.is-start:not(.selected) { background: var(--black); }
    .cal-cell.is-start:not(.selected) .dn { color: white; }
    .cal-legend { display: flex; gap: 12px; margin-top: 16px; font-size: 11px; color: var(--muted); flex-wrap: wrap; align-items: center; }
    .ld { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 3px; flex-shrink: 0; }

    /* Settings */
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; font-weight: 700; }
    .setting-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .setting-val { font-size: 14px; font-weight: 800; color: var(--red); }
    .date-input { border: 2px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 14px; font-family: inherit; font-weight: 700; color: var(--black); background: var(--bg); outline: none; display: block; width: 100%; }
    .date-input:focus { border-color: var(--red); }
    .btn-red { background: var(--red); color: white; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; display: block; width: 100%; }
    .btn-red:active { opacity: 0.8; }
    .btn-ghost { background: none; color: var(--muted); border: 2px solid var(--border); border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-ghost:active { opacity: 0.7; }

    /* ── Mission editor ── */
    .mission-section { margin-bottom: 20px; }
    .mission-section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    .mission-section-header .emoji { font-size: 22px; }
    .mission-section-header .label { font-size: 16px; font-weight: 800; flex: 1; }
    .mission-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      animation: slideIn 0.15s ease;
    }
    .mission-item:last-of-type { border-bottom: none; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
    .mission-input {
      flex: 1; border: none; outline: none; font-family: inherit;
      font-size: 14px; font-weight: 600; color: var(--black);
      background: transparent; padding: 4px 0;
      border-bottom: 2px solid transparent; transition: border-color 0.15s;
    }
    .mission-input:focus { border-bottom-color: var(--red); }
    .mission-input::placeholder { color: #ccc; }
    .drag-handle {
      color: #ccc; font-size: 16px; cursor: grab; padding: 0 2px;
      user-select: none; touch-action: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .del-btn {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: #f5f4f0; color: #bbb; font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s; font-family: inherit;
    }
    .del-btn:hover { background: #ffe0e0; color: var(--red); }
    .add-mission-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      background: none; border: 2px dashed var(--border); border-radius: 12px;
      padding: 10px 14px; font-size: 13px; font-weight: 700; color: var(--muted);
      cursor: pointer; font-family: inherit; margin-top: 8px; transition: all 0.15s;
    }
    .add-mission-btn:hover { border-color: var(--red); color: var(--red); }
    .add-mission-btn:active { opacity: 0.7; }
    .mission-save-bar {
      position: sticky; bottom: calc(70px + var(--safe-bottom));
      background: rgba(245,244,240,0.95); backdrop-filter: blur(10px);
      padding: 12px 0 4px; margin-top: 4px; z-index: 50;
    }

    /* Summary */
    #summary { display: flex; gap: 10px; }
    .sum-card { flex: 1; background: var(--card); border-radius: 14px; padding: 12px 8px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }

    /* Stats */
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-bar-wrap { width: 110px; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .stat-bar { height: 100%; border-radius: 4px; background: var(--red); transition: width 0.4s; }

    /* Toast / confetti */
    #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: white; padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 998; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Install */
    #install-banner { background: var(--black); color: white; padding: 12px 16px; border-radius: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
    #install-banner .ib-text { flex: 1; font-size: 13px; line-height: 1.5; }
    #install-banner .ib-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
    #install-banner .ib-close { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
    #install-btn { background: var(--red); color: white; border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; white-space: nowrap; }
  </style>
</head>
<body>
<div id="app">
  <div id="scroll"></div>
  <nav id="bottom-nav">
    <button class="nav-item active" data-view="today" onclick="switchView('today')">
      <span class="nav-icon">🔥</span>
      <span class="nav-label">오늘</span>
    </button>
    <button class="nav-item" data-view="calendar" onclick="switchView('calendar')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">달력</span>
    </button>
    <button class="nav-item" data-view="stats" onclick="switchView('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">통계</span>
    </button>
    <button class="nav-item" data-view="settings" onclick="switchView('settings')">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">설정</span>
    </button>
  </nav>
</div>
<canvas id="confetti"></canvas>
<div id="toast"></div>

<script>
/* ── DEFAULT HABITS ── */
const DEFAULT_HABITS = [
  { id:"health", label:"건강", emoji:"💪", color:"#E30613",
    tasks:["물 2L 마시기","30분 이상 운동","7시간 이상 수면","야식 금지"] },
  { id:"study",  label:"공부", emoji:"📖", color:"#1a1a1a",
    tasks:["독서 20페이지","강의/학습 30분","배운 것 기록","영어 10분"] },
  { id:"system", label:"체계", emoji:"🗂", color:"#666",
    tasks:["하루 계획 세우기","할 일 목록 정리","오늘 회고 작성","내일 준비"] },
];

const TOTAL = 50;
const DOW = ["일","월","화","수","목","금","토"];
const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let currentView = "today";
let deferredPrompt = null;
let calViewYear, calViewMonth;
let _currentDay = null;

/* ── Habit storage: tasks are editable and saved per habit ── */
function loadHabits() {
  try {
    const saved = localStorage.getItem('h50_habits');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge with defaults to preserve color/emoji/id if missing
      return DEFAULT_HABITS.map(def => {
        const s = parsed.find(h => h.id === def.id);
        return s ? { ...def, tasks: s.tasks, label: s.label || def.label } : def;
      });
    }
  } catch(e) {}
  return DEFAULT_HABITS.map(h => ({ ...h, tasks: [...h.tasks] }));
}
function saveHabits(habits) {
  localStorage.setItem('h50_habits', JSON.stringify(
    habits.map(h => ({ id: h.id, label: h.label, tasks: h.tasks }))
  ));
}
let HABITS = loadHabits();

/* ── Start date ── */
function getStartDate(){
  const s = localStorage.getItem('h50_startDate');
  return s ? new Date(s + 'T00:00:00') : null;
}
function setStartDate(str){ localStorage.setItem('h50_startDate', str); }
function dateToDay(date){
  const start = getStartDate();
  if(!start) return null;
  const d = new Date(date); d.setHours(0,0,0,0);
  const s = new Date(start); s.setHours(0,0,0,0);
  const diff = Math.round((d - s) / 86400000);
  return (diff >= 0 && diff < TOTAL) ? diff+1 : null;
}
function dayToDate(day){
  const start = getStartDate();
  if(!start) return null;
  const d = new Date(start);
  d.setDate(d.getDate() + day - 1);
  return d;
}
function todayDay(){
  const start = getStartDate();
  if(!start) return 1;
  const today = new Date(); today.setHours(0,0,0,0);
  const s = new Date(start); s.setHours(0,0,0,0);
  const diff = Math.round((today - s) / 86400000);
  if(diff < 0) return 1;
  if(diff >= TOTAL) return TOTAL;
  return diff+1;
}
function fmtDate(date){
  if(!date) return "—";
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}

/* ── Check storage ── */
function gk(d,h,i){ return `h50_d${d}_${h}_${i}`; }
function getCheck(d,h,i){ return localStorage.getItem(gk(d,h,i))==="1"; }
function setCheck(d,h,i,v){ localStorage.setItem(gk(d,h,i),v?"1":"0"); }
function getDayPct(d){
  let tot=0,done=0;
  HABITS.forEach(h=>h.tasks.forEach((_,i)=>{ tot++; if(getCheck(d,h.id,i)) done++; }));
  return tot?done/tot:0;
}
function getTotalPct(hid){
  let tot=0,done=0;
  const h = HABITS.find(h=>h.id===hid);
  if(!h) return 0;
  for(let d=1;d<=TOTAL;d++) h.tasks.forEach((_,i)=>{ tot++; if(getCheck(d,hid,i)) done++; });
  return tot?done/tot:0;
}
function getStreak(){
  const td = todayDay();
  let s=0;
  for(let d=td;d>=1;d--){ if(getDayPct(d)===1) s++; else break; }
  return s;
}
function getCurrentDay(){ if(_currentDay===null) _currentDay=todayDay(); return _currentDay; }
function setCurrentDay(d){ _currentDay=d; }

/* ── TODAY ── */
function renderToday(){
  const cd = getCurrentDay();
  const pct = getDayPct(cd);
  const ring = 2*Math.PI*44, off = ring*(1-pct);
  const dateLabel = dayToDate(cd) ? fmtDate(dayToDate(cd)) : "";
  const start = getStartDate();

  let html = `<div class="header">
    <div class="header-tag">50일 챌린지</div>
    <div class="header-title">나를 만드는<br>50일</div>
  </div>`;

  if(deferredPrompt){
    html += `<div id="install-banner">
      <span style="font-size:26px;flex-shrink:0">📱</span>
      <div class="ib-text"><strong>앱으로 설치하기</strong>홈 화면에 추가해서 사용하세요</div>
      <button id="install-btn" onclick="installPWA()">설치</button>
      <button class="ib-close" onclick="this.closest('#install-banner').remove()">✕</button>
    </div>`;
  }

  if(!start){
    html += `<div class="card" style="text-align:center;padding:32px 20px">
      <div style="font-size:48px;margin-bottom:14px">🗓</div>
      <div style="font-weight:800;font-size:17px;margin-bottom:8px">시작일을 설정해주세요</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.7">챌린지 시작 날짜를 설정하면<br>달력과 날짜가 자동으로 연동됩니다</div>
      <button class="btn-red" onclick="switchView('settings')">⚙️ 설정하러 가기</button>
    </div>`;
    document.getElementById('scroll').innerHTML = html;
    return;
  }

  html += `<div class="card">
    <div id="ring-wrap">
      <div id="ring-label">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="44" fill="none" stroke="#f0f0f0" stroke-width="8"/>
          <circle cx="48" cy="48" r="44" fill="none" stroke="#E30613" stroke-width="8"
            stroke-dasharray="${ring.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
            stroke-linecap="round" style="transition:stroke-dashoffset .4s"/>
        </svg>
        <div id="ring-inner"><span id="ring-pct">${Math.round(pct*100)}%</span></div>
      </div>
      <div id="ring-info">
        <h2>${cd}일차</h2>
        <div class="sub">${dateLabel}<br>${TOTAL-cd}일 남음 · 🔥 ${getStreak()}일 연속</div>
        <div id="day-nav">
          <button class="day-btn" onclick="changeDay(-1)">‹</button>
          <button class="day-btn" onclick="changeDay(1)">›</button>
        </div>
      </div>
    </div>
  </div>`;

  HABITS.forEach(h=>{
    const done = h.tasks.filter((_,i)=>getCheck(cd,h.id,i)).length;
    const p = h.tasks.length ? done/h.tasks.length : 0;
    html += `<div class="card">
      <div class="habit-header">
        <div style="display:flex;align-items:center;gap:9px">
          <span style="font-size:20px">${h.emoji}</span>
          <span style="font-size:16px;font-weight:800">${h.label}</span>
        </div>
        <span style="font-size:13px;font-weight:800;color:${h.color}">${done}/${h.tasks.length}</span>
      </div>
      <div class="mini-bar"><div class="mini-bar-fill" style="width:${p*100}%;background:${h.color}"></div></div>`;
    if(h.tasks.length === 0){
      html += `<div style="font-size:13px;color:var(--muted);text-align:center;padding:10px 0">미션이 없어요 · 설정에서 추가하세요</div>`;
    } else {
      h.tasks.forEach((t,i)=>{
        const checked = getCheck(cd,h.id,i);
        html += `<div class="task-row">
          <button class="check ${checked?'done':''}" onclick="toggle('${h.id}',${i})">
            ${checked?`<svg width="12" height="9"><polyline points="1,4.5 4.5,8 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`:''}
          </button>
          <span class="task-label ${checked?'done':''}">${t}</span>
        </div>`;
      });
    }
    html += `</div>`;
  });

  html += `<div id="summary">`;
  HABITS.forEach(h=>{
    html += `<div class="sum-card">
      <div style="font-size:18px">${h.emoji}</div>
      <div style="font-size:14px;font-weight:900;margin-top:4px">${Math.round(getTotalPct(h.id)*100)}%</div>
      <div style="font-size:10px;color:var(--muted);margin-top:1px;font-weight:600">${h.label}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('scroll').innerHTML = html;
  if(pct===1) showConfetti();
}

/* ── CALENDAR ── */
function renderCalendar(){
  const today = new Date(); today.setHours(0,0,0,0);
  if(calViewYear===undefined){ calViewYear=today.getFullYear(); calViewMonth=today.getMonth(); }
  const start = getStartDate();
  const endDate = start ? new Date(start.getTime()+(TOTAL-1)*86400000) : null;
  const daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
  const startDow = new Date(calViewYear, calViewMonth, 1).getDay();

  let html = `<div class="header">
    <div class="header-tag">50일 챌린지</div>
    <div class="header-title">달력</div>
  </div>
  <div class="card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
      <span class="cal-month-title">${calViewYear}년 ${MONTHS[calViewMonth]}</span>
      <button class="cal-nav-btn" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-dow">${DOW.map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="cal-grid">`;

  for(let i=0;i<startDow;i++) html += `<div class="cal-cell empty"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const cellDate = new Date(calViewYear, calViewMonth, day); cellDate.setHours(0,0,0,0);
    const isToday = cellDate.getTime()===today.getTime();
    const cDay = start ? dateToDay(cellDate) : null;
    const inChallenge = cDay !== null;
    const isStart = start && cellDate.getTime()===new Date(start).setHours(0,0,0,0);
    const isSelected = inChallenge && cDay===getCurrentDay();
    const pct = inChallenge ? getDayPct(cDay) : 0;
    const isFuture = inChallenge && cDay > todayDay();
    const isFull = inChallenge && !isFuture && pct===1;
    const isPartial = inChallenge && !isFuture && pct>0 && pct<1;

    let cls = "cal-cell";
    if(!inChallenge) cls += " out";
    if(isToday) cls += " is-today";
    if(isSelected) cls += " selected";
    if(isFull && !isSelected) cls += " full";
    if(isStart && !isSelected) cls += " is-start";

    let style = isPartial && !isSelected ? `background:rgba(227,6,19,${0.1+pct*0.35});` : "";
    let dotBg = "transparent";
    if(inChallenge && !isFuture && pct>0) dotBg = (pct===1||isSelected)?"rgba(255,255,255,0.55)":"var(--red)";
    const numStyle = !inChallenge ? "color:#ccc" : (isStart&&!isSelected) ? "color:white" : "";
    const click = inChallenge ? `onclick="goDay(${cDay})"` : "";

    html += `<div class="${cls}" style="${style}" ${click}>
      <span class="dn" style="${numStyle}">${day}</span>
      <div class="db" style="background:${dotBg}"></div>
    </div>`;
  }

  html += `</div>
    <div class="cal-legend">
      <span><span class="ld" style="background:#1a1a1a"></span>시작일/선택</span>
      <span><span class="ld" style="background:#E30613"></span>완료</span>
      <span><span class="ld" style="background:rgba(227,6,19,0.4)"></span>부분완료</span>
    </div>`;

  if(start && endDate){
    html += `<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;text-align:center">
      <div style="flex:1"><div style="font-size:11px;color:var(--muted);font-weight:700">시작일</div><div style="font-size:14px;font-weight:800;margin-top:3px">${fmtDate(start)}</div></div>
      <div style="flex:1;border-left:1px solid var(--border);border-right:1px solid var(--border)"><div style="font-size:11px;color:var(--muted);font-weight:700">오늘</div><div style="font-size:14px;font-weight:800;color:var(--red);margin-top:3px">${todayDay()}일차</div></div>
      <div style="flex:1"><div style="font-size:11px;color:var(--muted);font-weight:700">종료일</div><div style="font-size:14px;font-weight:800;margin-top:3px">${fmtDate(endDate)}</div></div>
    </div>`;
  }
  html += `</div>`;

  html += `<div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:14px">50일 한눈에 보기</div>
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px">`;
  for(let d=1;d<=TOTAL;d++){
    const p=getDayPct(d), isCur=d===getCurrentDay();
    const bg=p===0?"#ece9e4":p===1?"#E30613":`rgba(227,6,19,${0.2+p*0.6})`;
    html+=`<button style="border:none;border-radius:50%;aspect-ratio:1;background:${bg};cursor:pointer;${isCur?'outline:2.5px solid #1a1a1a;outline-offset:1.5px':''}" onclick="goDay(${d})" title="${d}일차"></button>`;
  }
  html += `</div></div>`;
  document.getElementById('scroll').innerHTML = html;
}

function calMove(dir){
  calViewMonth+=dir;
  if(calViewMonth<0){calViewMonth=11;calViewYear--;}
  if(calViewMonth>11){calViewMonth=0;calViewYear++;}
  renderCalendar();
}

/* ── STATS ── */
function renderStats(){
  const completedDays=Array.from({length:TOTAL},(_,i)=>i+1).filter(d=>getDayPct(d)===1).length;
  const totalPct=Math.round(Array.from({length:TOTAL},(_,i)=>getDayPct(i+1)).reduce((a,b)=>a+b,0)/TOTAL*100);
  let html=`<div class="header">
    <div class="header-tag">50일 챌린지</div>
    <div class="header-title">나의 통계</div>
  </div>
  <div class="card" style="display:flex">
    ${[{v:`${completedDays}일`,l:"완료한 날",s:"/ 50일"},{v:`${totalPct}%`,l:"전체 달성률",s:""},{v:`${getStreak()}일`,l:"연속 달성",s:"🔥"}]
      .map(s=>`<div style="flex:1;text-align:center;padding:6px 2px">
        <div style="font-size:24px;font-weight:900;color:var(--red)">${s.v}</div>
        <div style="font-size:10px;color:var(--muted);font-weight:700;margin-top:3px">${s.l} ${s.s}</div>
      </div>`).join('')}
  </div>
  <div class="card"><div style="font-size:14px;font-weight:800;margin-bottom:4px">카테고리별 달성률</div>`;
  HABITS.forEach(h=>{
    const p=getTotalPct(h.id);
    html+=`<div class="stat-row">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">${h.emoji}</span>
        <span style="font-weight:700;font-size:14px">${h.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${p*100}%;background:${h.color}"></div></div>
        <span style="font-size:13px;font-weight:800;color:${h.color};min-width:32px;text-align:right">${Math.round(p*100)}%</span>
      </div>
    </div>`;
  });
  html+=`</div><div class="card"><div style="font-size:14px;font-weight:800;margin-bottom:10px">일별 완료 현황</div>`;
  let any=false;
  for(let d=1;d<=TOTAL;d++){
    const p=getDayPct(d);
    if(p>0){
      any=true;
      const ds=dayToDate(d)?fmtDate(dayToDate(d)):"";
      html+=`<div class="stat-row" onclick="goDay(${d})" style="cursor:pointer">
        <div>
          <div style="font-weight:700;font-size:14px">${d}일차</div>
          ${ds?`<div style="font-size:11px;color:var(--muted)">${ds}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="stat-bar-wrap"><div class="stat-bar" style="width:${p*100}%"></div></div>
          <span style="font-size:13px;font-weight:800;color:var(--red);min-width:32px;text-align:right">${Math.round(p*100)}%</span>
        </div>
      </div>`;
    }
  }
  if(!any) html+=`<div style="text-align:center;padding:20px;color:var(--muted);font-size:14px">아직 기록이 없어요</div>`;
  html+=`</div>`;
  document.getElementById('scroll').innerHTML=html;
}

/* ── SETTINGS ── */
function renderSettings(){
  const start=getStartDate();
  const endDate=start?new Date(start.getTime()+(TOTAL-1)*86400000):null;
  const todayStr=new Date().toISOString().slice(0,10);

  let html=`<div class="header">
    <div class="header-tag">50일 챌린지</div>
    <div class="header-title">설정</div>
  </div>

  <!-- ① 미션 편집 -->
  <div class="card">
    <div style="font-size:15px;font-weight:800;margin-bottom:16px">✏️ 미션 편집</div>`;

  HABITS.forEach((h, hi) => {
    html += `<div class="mission-section">
      <div class="mission-section-header">
        <span class="emoji">${h.emoji}</span>
        <span class="label">${h.label}</span>
      </div>
      <div id="task-list-${h.id}">`;
    h.tasks.forEach((t, ti) => {
      html += `<div class="mission-item" id="mi-${h.id}-${ti}" draggable="true"
          ondragstart="dragStart(event,'${h.id}',${ti})"
          ondragover="dragOver(event,'${h.id}',${ti})"
          ondrop="dragDrop(event,'${h.id}',${ti})"
          ondragend="dragEnd()">
        <span class="drag-handle" title="드래그해서 순서 변경">⠿</span>
        <input class="mission-input" type="text"
          id="task-${h.id}-${ti}"
          value="${t.replace(/"/g,'&quot;')}"
          placeholder="미션을 입력하세요"
          maxlength="30"/>
        <button class="del-btn" onclick="deleteTask('${h.id}',${ti})" title="삭제">×</button>
      </div>`;
    });
    html += `</div>
      <button class="add-mission-btn" onclick="addTask('${h.id}')">
        <span style="font-size:18px">+</span> 미션 추가
      </button>
    </div>`;
    if(hi < HABITS.length - 1) html += `<div style="height:1px;background:var(--border);margin:16px 0"></div>`;
  });

  html += `<div class="mission-save-bar">
    <button class="btn-red" onclick="saveMissions()">💾 미션 저장하기</button>
  </div>
  </div>

  <!-- ② 챌린지 기간 -->
  <div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:2px">📅 챌린지 기간</div>
    <div class="setting-row">
      <div><div class="setting-label">시작일</div><div class="setting-sub">챌린지를 시작하는 날짜</div></div>
      <span class="setting-val">${start?fmtDate(start):"미설정"}</span>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">종료일</div><div class="setting-sub">시작일 기준 50일째</div></div>
      <span class="setting-val">${endDate?fmtDate(endDate):"—"}</span>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">현재 진행일</div><div class="setting-sub">오늘 기준</div></div>
      <span class="setting-val">${start?todayDay()+"일차":"—"}</span>
    </div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">시작일 변경</div>
      <input type="date" id="start-date-input" class="date-input" value="${start?start.toISOString().slice(0,10):todayStr}" style="margin-bottom:10px"/>
      <button class="btn-red" onclick="saveStartDateFromSettings()">저장하기</button>
    </div>
  </div>

  <!-- ③ 데이터 관리 -->
  <div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:2px">🗑 데이터 관리</div>
    <div class="setting-row">
      <div><div class="setting-label">기록 초기화</div><div class="setting-sub">모든 체크 기록이 삭제됩니다</div></div>
      <button class="btn-ghost" onclick="resetData()">초기화</button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">미션 기본값으로</div><div class="setting-sub">미션을 처음 상태로 되돌립니다</div></div>
      <button class="btn-ghost" onclick="resetMissions()">되돌리기</button>
    </div>
  </div>`;

  document.getElementById('scroll').innerHTML = html;
}

/* ── Mission editing functions ── */
function addTask(hid){
  const h = HABITS.find(x=>x.id===hid);
  if(!h) return;
  if(h.tasks.length >= 8){ showToast("미션은 최대 8개까지 가능해요"); return; }
  h.tasks.push("");
  renderSettings();
  // focus new input
  setTimeout(()=>{
    const inputs = document.querySelectorAll(`#task-list-${hid} .mission-input`);
    if(inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function deleteTask(hid, idx){
  const h = HABITS.find(x=>x.id===hid);
  if(!h) return;
  if(h.tasks.length <= 1){ showToast("미션은 최소 1개 필요해요"); return; }
  // read current values from DOM before modifying
  syncInputsToHabit(hid);
  h.tasks.splice(idx, 1);
  renderSettings();
}

function syncInputsToHabit(hid){
  const h = HABITS.find(x=>x.id===hid);
  if(!h) return;
  h.tasks.forEach((_, i) => {
    const input = document.getElementById(`task-${hid}-${i}`);
    if(input) h.tasks[i] = input.value.trim();
  });
}

function saveMissions(){
  // Read all current input values
  HABITS.forEach(h => {
    h.tasks.forEach((_, i) => {
      const input = document.getElementById(`task-${h.id}-${i}`);
      if(input) h.tasks[i] = input.value.trim();
    });
    // Remove empty tasks
    h.tasks = h.tasks.filter(t => t.length > 0);
    if(h.tasks.length === 0) h.tasks = ["미션을 입력해주세요"];
  });
  saveHabits(HABITS);
  showToast("✅ 미션이 저장되었습니다!");
  renderSettings();
}

function resetMissions(){
  if(!confirm("미션을 기본값으로 되돌릴까요?")) return;
  HABITS = DEFAULT_HABITS.map(h => ({ ...h, tasks: [...h.tasks] }));
  saveHabits(HABITS);
  showToast("미션이 기본값으로 변경되었습니다");
  renderSettings();
}

/* ── Drag to reorder ── */
let dragHid=null, dragFrom=null;
function dragStart(e, hid, idx){
  dragHid=hid; dragFrom=idx;
  syncInputsToHabit(hid);
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.4';
}
function dragOver(e, hid, idx){
  if(dragHid===hid){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }
}
function dragDrop(e, hid, idx){
  e.preventDefault();
  if(dragHid!==hid || dragFrom===idx) return;
  const h = HABITS.find(x=>x.id===hid);
  if(!h) return;
  const [item] = h.tasks.splice(dragFrom, 1);
  h.tasks.splice(idx, 0, item);
  renderSettings();
}
function dragEnd(){ document.querySelectorAll('.mission-item').forEach(el=>el.style.opacity=''); }

/* ── Other actions ── */
function render(){
  if(currentView==="today") renderToday();
  else if(currentView==="calendar") renderCalendar();
  else if(currentView==="stats") renderStats();
  else renderSettings();
}
function switchView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  render();
  document.getElementById('scroll').scrollTop=0;
}
function changeDay(d){
  const nd=Math.max(1,Math.min(TOTAL,getCurrentDay()+d));
  setCurrentDay(nd);
  const date=dayToDate(nd);
  if(date){calViewYear=date.getFullYear();calViewMonth=date.getMonth();}
  render();
}
function goDay(d){
  setCurrentDay(d);
  const date=dayToDate(d);
  if(date){calViewYear=date.getFullYear();calViewMonth=date.getMonth();}
  switchView('today');
}
function toggle(hid,idx){
  const cd=getCurrentDay();
  const v=!getCheck(cd,hid,idx);
  setCheck(cd,hid,idx,v);
  const pct=getDayPct(cd);
  render();
  if(pct===1){showToast("🎉 오늘 완벽 달성!");showConfetti();}
  else if(v){
    const h=HABITS.find(x=>x.id===hid);
    const done=h.tasks.filter((_,i)=>getCheck(cd,hid,i)).length;
    if(done===h.tasks.length) showToast(`${h.emoji} ${h.label} 완료!`);
  }
}
function saveStartDateFromSettings(){
  const input=document.getElementById('start-date-input');
  if(!input||!input.value){showToast("날짜를 선택해주세요");return;}
  setStartDate(input.value);
  _currentDay=todayDay();
  const d=getStartDate();
  if(d){calViewYear=d.getFullYear();calViewMonth=d.getMonth();}
  showToast("✅ 시작일이 저장되었습니다!");
  render();
}
function resetData(){
  if(!confirm("모든 기록을 초기화할까요?\n이 작업은 되돌릴 수 없습니다.")) return;
  for(let d=1;d<=TOTAL;d++) HABITS.forEach(h=>h.tasks.forEach((_,i)=>localStorage.removeItem(gk(d,h.id,i))));
  showToast("초기화 완료");
  render();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function showConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:60},()=>({
    x:Math.random()*canvas.width,y:-20,r:4+Math.random()*6,
    c:['#E30613','#FFD700','#4CAF50','#2196F3'][Math.floor(Math.random()*4)],
    vx:(Math.random()-.5)*4,vy:3+Math.random()*4,rot:Math.random()*360,vr:(Math.random()-.5)*10
  }));
  let frame;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.06;
    });
    if(pieces.some(p=>p.y<canvas.height)) frame=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  cancelAnimationFrame(frame);draw();
}
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(currentView==='today') render();
});
function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// Init
const _s=getStartDate();
if(_s){calViewYear=_s.getFullYear();calViewMonth=_s.getMonth();}
else{const _t=new Date();calViewYear=_t.getFullYear();calViewMonth=_t.getMonth();}
_currentDay=todayDay();
render();
</script>
